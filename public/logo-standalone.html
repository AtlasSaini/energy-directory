<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Energy Directory — Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 64px; background: #F5F5F7; padding: 48px; }

    /* ── Shared logo component ── */
    .logo { display: inline-flex; align-items: center; gap: 14px; }
    .bars { display: flex; flex-direction: column; gap: 5px; }
    .bar { border-radius: 3px; }
    .bar-1 { width: 36px; }
    .bar-2 { width: 24px; }
    .bar-3 { width: 30px; }
    .wordmark { font-weight: 700; letter-spacing: -0.03em; line-height: 1; }

    /* ── Size variants ── */
    .logo-xl .bar  { height: 7px; background: #E8590C; }
    .logo-xl .bar-1 { width: 44px; }
    .logo-xl .bar-2 { width: 29px; }
    .logo-xl .bar-3 { width: 37px; }
    .logo-xl .wordmark { font-size: 44px; color: #1D1D1F; }
    .logo-xl .wordmark em { font-style: normal; color: #E8590C; }
    .logo-xl { gap: 18px; }
    .logo-xl .bars { gap: 6px; }

    .logo-md .bar  { height: 4px; background: #E8590C; }
    .logo-md .wordmark { font-size: 24px; color: #1D1D1F; }
    .logo-md .wordmark em { font-style: normal; color: #E8590C; }

    .logo-sm .bar  { height: 3px; background: #E8590C; }
    .logo-sm .bar-1 { width: 22px; }
    .logo-sm .bar-2 { width: 15px; }
    .logo-sm .bar-3 { width: 19px; }
    .logo-sm .wordmark { font-size: 15px; color: #1D1D1F; }
    .logo-sm .wordmark em { font-style: normal; color: #E8590C; }
    .logo-sm { gap: 8px; }
    .logo-sm .bars { gap: 3px; }

    /* Icon only */
    .logo-icon .bar { height: 5px; background: #E8590C; border-radius: 3px; }
    .logo-icon .bar-1 { width: 36px; }
    .logo-icon .bar-2 { width: 24px; }
    .logo-icon .bar-3 { width: 30px; }
    .logo-icon .bars { gap: 5px; }

    /* ── Cards ── */
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 56px 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      width: 100%;
      max-width: 680px;
    }
    .card-dark { background: #1D1D1F; }
    .card-dark .bar { background: #E8590C; }
    .card-dark .wordmark { color: #fff !important; }
    .card-dark .wordmark em { color: #E8590C !important; }

    .card-orange { background: #E8590C; }
    .card-orange .bar { background: #fff; }
    .card-orange .wordmark { color: #fff !important; }
    .card-orange .wordmark em { color: rgba(255,255,255,0.65) !important; }

    .row { display: flex; align-items: center; gap: 48px; flex-wrap: wrap; justify-content: center; }
    .label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #6E6E73; align-self: flex-start; }
    .card-dark .label { color: rgba(255,255,255,0.35); }
    .card-orange .label { color: rgba(255,255,255,0.5); }
    .sep { width: 100%; height: 1px; background: #E8E8ED; }
    .card-dark .sep { background: rgba(255,255,255,0.08); }
    .card-orange .sep { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

  <!-- White: all sizes -->
  <div class="card">
    <span class="label">Energy Directory — Primary Logo</span>
    <div class="sep"></div>

    <!-- XL -->
    <div class="logo logo-xl">
      <div class="bars">
        <div class="bar bar-1"></div>
        <div class="bar bar-2"></div>
        <div class="bar bar-3"></div>
      </div>
      <span class="wordmark">Energy<em>Directory</em></span>
    </div>

    <div class="sep"></div>

    <div class="row">
      <!-- MD -->
      <div class="logo logo-md">
        <div class="bars">
          <div class="bar bar-1"></div>
          <div class="bar bar-2"></div>
          <div class="bar bar-3"></div>
        </div>
        <span class="wordmark">Energy<em>Directory</em></span>
      </div>

      <!-- SM -->
      <div class="logo logo-sm">
        <div class="bars">
          <div class="bar bar-1"></div>
          <div class="bar bar-2"></div>
          <div class="bar bar-3"></div>
        </div>
        <span class="wordmark">Energy<em>Directory</em></span>
      </div>

      <!-- Icon only -->
      <div class="logo-icon">
        <div class="bars">
          <div class="bar bar-1"></div>
          <div class="bar bar-2"></div>
          <div class="bar bar-3"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Dark -->
  <div class="card card-dark">
    <span class="label">On Dark</span>
    <div class="sep"></div>
    <div class="logo logo-xl">
      <div class="bars">
        <div class="bar bar-1"></div>
        <div class="bar bar-2"></div>
        <div class="bar bar-3"></div>
      </div>
      <span class="wordmark">Energy<em>Directory</em></span>
    </div>
  </div>

  <!-- Orange -->
  <div class="card card-orange">
    <span class="label">On Orange</span>
    <div class="sep"></div>
    <div class="logo logo-xl">
      <div class="bars">
        <div class="bar bar-1"></div>
        <div class="bar bar-2"></div>
        <div class="bar bar-3"></div>
      </div>
      <span class="wordmark">Energy<em>Directory</em></span>
    </div>
  </div>

</body>
</html>
